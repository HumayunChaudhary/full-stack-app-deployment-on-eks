name: Production CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  promote-image-to-prod:
    name: Pull qa image and tag for prod
    runs-on: ubuntu-latest
    env:
      QA_IMAGE: humayun27/nodejs-app:latest
      PROD_IMAGE: humayun27/nodejs-app:prod-${{ github.sha }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          passwOrd: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull qa image
        run: docker pull "${QA_IMAGE}"
      - name: Tag image for prod
        run: docker tag "${QA_IMAGE}" "${PROD_IMAGE}"
      - name: Push prod image
        run: docker push "${PROD_IMAGE}"

  update-prod-k8s-manifest:
    name: Update K8S manifest
    needs: promote-image-to-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Update image tag in manifest
        run: |
          sed -i "s|image: humayun27/nodejs-app:.*|image: humayun27/nodejs-app:prod-${GITHUB_SHA}|g" k8-manifests/app-deployment.yaml
      - name: Verify the update
        run: |
          cat k8-manifests/app-deployment.yaml
      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/app-deployment.yaml
          git commit -m "Updated image in app-deployment.yaml [skip ci]"
          git push origin main
