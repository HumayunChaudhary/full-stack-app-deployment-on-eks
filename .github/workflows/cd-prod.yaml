name: Production CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  promote-image-to-prod:
    name: Pull qa image and tag for prod
    runs-on: ubuntu-latest
    env:
      QA_IMAGE: humayun27/nodejs-app:latest
      PROD_IMAGE: humayun27/nodejs-app:prod-${{ github.sha }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          passowrd: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull qa image
        run: docker pull "${QA_IMAGE}"
      - name: Tag image for prod
        run: docker tag "${QA_IMAGE}" "${PROD_IMAGE}"
      - name: Push prod image
        run: docker push "${PROD_IMAGE}"
