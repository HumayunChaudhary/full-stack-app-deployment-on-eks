name: Enterprise Devsecops CICD pipeline

on:
  push:
    branches:
      - qa
    paths:
      - client/**
      - server/**
      - .github/workflows/qa-ci.yml

env:
  ECR_REPOSITORY: nodejs-app
  AWS_REGION: us-east-1

jobs:
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push docker image to AWS ECR
        env:
         REGISTRY: ${{ steps.login-ecr.outputs.registry }}
         IMAGE_TAG: ${{ github.sha }}
        run: |
         docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
         docker tag $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:latest
         
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: latest
          cache: true
      
      - name: Verify Trivy installation
        run: |
          trivy --version
          which trivy

      - name: Run Trivy image scan (json)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          trivy image $REGISTRY/$ECR_REPOSITORY:latest \
            --format json \
            --output image-trivy-report.json \
            --severity HIGH,CRITICAL \
            --ignore-fixed \
            --exit-code 0

      - name: Run Trivy image scan (table)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          trivy image $REGISTRY/$ECR_REPOSITORY:latest \
          --format table \
          --output image-trivy-report.txt \
          --serverity HIGH,CRITICAL \ 
          --ignore-fixed \
          --exit-code 0
      
      - name: Upload Trivy image json report
        uses: actions/upload-artifact@v4
        with:
          name: image-trivy-report-json
          path: image-trivy-report.json
          if-no-files-found: warn

      - name: Upload Trivy image table report
        uses: actions/upload-artifact@v4
        with:
          name: image-trivy-report-table
          path: image-trivy-report.txt
          if-no-files-found: warn

      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/$ECR_REPOSITORY:latest
